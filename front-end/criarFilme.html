<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../back-end/style.css">
    <title>Criar Filme</title>
</head>
<body class="cinema">

    <div class="menuNav">
        <img src="../back-end/img/logo.png" class="logo">

        <a href="index.html">Inicio</a>
        <a href="criarFilme.html">Adicionar produto</a>
        <a href="sobre.html">Sobre</a>

    </div>

    <div class="form-wrapper">
        <div class="card-criar">
            <h2 class="titulo-form">Adicionar Filme</h2>

            <form id="form">
                <input type="text" id="nome" placeholder="Nome" required>

                <input type="text" id="descricao" placeholder="Descrição" required>

                <input type="text" id="imagem" placeholder="URL da imagem" required>

                <input type="text" id="ano" placeholder="Ano do filme" required>

                <button type="submit" class="btn">Enviar</button>
            </form>

            <button class="btn voltar" onclick="window.location.href='index.html'">
                Voltar
            </button>
        </div>
    </div>

    <script src="../back-end/funcoes.js"></script>
    <script>
        adicionar()
    </script>

</body>
</html>
